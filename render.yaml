services:
  - type: web
    name: shl-assessment-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}
    plan: free
    healthCheckPath: /health

  - type: web
    name: shl-assessment-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port ${PORT:-8501} --server.address 0.0.0.0
    plan: free
    envVars:
      - key: API_URL
        value: https://shl-assessment-api-u110.onrender.com